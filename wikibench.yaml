# WikiBench default configuration
# Override any value via environment variable: WIKIBENCH__<SECTION>__<KEY>
# e.g. WIKIBENCH__LLM__DEFAULT_MODEL=gpt-4o

llm:
  default_model: gemini/gemini-2.5-flash
  judge_model: gemini/gemini-2.5-flash
  # api_key: ""           # reads from GEMINI_API_KEY / OPENAI_API_KEY etc.
  # Gemini 2.5 Flash has thinking enabled by default; disable for lower latency/cost
  extra_kwargs:
    thinking:
      type: disabled

cache:
  enabled: true
  dir: .wikibench-cache
  ttl_days: 30

runner:
  seed: 42
  ingest_timeout_s: 1800   # 30 minutes
  query_timeout_s: 60
  max_parallel_queries: 4

cost:
  hard_limit_usd: 10.0     # abort run if exceeded
  warn_threshold_usd: 5.0

storage:
  backend: sqlite           # sqlite | json
  path: .wikibench-runs.db

logging:
  level: INFO
  json: false
